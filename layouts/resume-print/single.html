<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>{{ .Title }}</title>
  <style>
    /* --- Print-friendly resume --- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 11pt;
      line-height: 1.5;
      color: #1a1a1a;
      background: #fff;
      max-width: 8.5in;
      margin: 0 auto;
      padding: 0.5in 0.6in;
    }

    /* Headings */
    h2 {
      font-family: 'Helvetica Neue', 'Arial', sans-serif;
      font-size: 22pt;
      font-weight: 700;
      color: #111;
      margin-bottom: 2pt;
    }

    h3 {
      font-family: 'Helvetica Neue', 'Arial', sans-serif;
      font-size: 12pt;
      font-weight: 700;
      color: #222;
      text-transform: uppercase;
      letter-spacing: 0.5pt;
      border-bottom: 1.5pt solid #333;
      padding-bottom: 3pt;
      margin-top: 14pt;
      margin-bottom: 6pt;
    }

    h4 {
      font-family: 'Helvetica Neue', 'Arial', sans-serif;
      font-size: 11pt;
      font-weight: 700;
      color: #1a1a1a;
      margin-top: 8pt;
      margin-bottom: 1pt;
    }

    /* Subtitle / tagline */
    h2 + p strong {
      font-family: 'Helvetica Neue', 'Arial', sans-serif;
      font-size: 10.5pt;
      font-weight: 400;
      color: #444;
      letter-spacing: 0.3pt;
    }

    /* Contact line */
    h2 + p + p {
      font-size: 9.5pt;
      color: #555;
      margin-bottom: 4pt;
    }

    p { margin-bottom: 4pt; }

    /* Links */
    a { color: #1a1a1a; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Dividers */
    hr {
      border: none;
      border-top: 0.5pt solid #ccc;
      margin: 8pt 0;
    }

    /* Lists */
    ul {
      margin: 3pt 0 6pt 0;
      padding-left: 16pt;
    }

    li {
      margin-bottom: 2pt;
      font-size: 10.5pt;
      line-height: 1.45;
    }

    /* Italic dates */
    em {
      font-style: italic;
      color: #555;
      font-size: 10pt;
    }

    /* Bold labels in skills */
    strong {
      font-weight: 700;
      color: #1a1a1a;
    }

    /* --- Screen-only banner --- */
    .print-banner {
      background: #f0f0f0;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 12px 16px;
      margin-bottom: 20px;
      font-family: 'Helvetica Neue', 'Arial', sans-serif;
      font-size: 10pt;
      color: #555;
      text-align: center;
    }

    .print-banner kbd {
      background: #e0e0e0;
      border: 1px solid #bbb;
      border-radius: 3px;
      padding: 1px 5px;
      font-family: monospace;
      font-size: 10pt;
    }

    /* --- Print overrides --- */
    @media print {
      body { padding: 0; }
      .print-banner { display: none; }
      a { color: #1a1a1a !important; }
      h3 { break-after: avoid; }
      h4 { break-after: avoid; }
      ul { break-inside: avoid; }
    }

    @page {
      margin: 0.5in 0.6in;
      size: letter;
    }
  </style>
</head>
<body>

  <div class="print-banner">
    Press <kbd>Cmd</kbd> + <kbd>P</kbd> to save as PDF &nbsp;|&nbsp;
    <a href="/resume/">Back to terminal resume</a>
  </div>

  {{ .Content }}

</body>
</html>
